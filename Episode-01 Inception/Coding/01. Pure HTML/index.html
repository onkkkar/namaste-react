<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>
      Namaste React - Pure HTML
    </title>
  </head>
  <body>
    <!-- Simplest version: no JS, no React — just plain HTML -->
    <!-- Pure HTML, above the root -->
    <h1>Hello Top of Root</h1>

    <div id="root">
      <h1>Hello World from HTML !!</h1>
    </div>

    <!-- Pure HTML, below the root -->
    <h1>Hello Bottom of Root</h1>
  </body>
</html>
