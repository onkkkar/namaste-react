<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />
    <title>
      Namaste React - Nested Elements
    </title>
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>
  <body>
    <!-- Root Div -->
    <div id="root"></div>

    <!-- React CDN -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <!--
  Demonstrates building NESTED structures with React.createElement(),
  e.g.:
    <div id="parent">
      <div id="child">
        <h1>Nested Heading</h1>
        <h2>Nested Heading 2</h2>
      </div>
    </div>

  See index.js for the full breakdown (single child vs multiple children).
    -->

    <!-- Script -->
    <script src="index.js"></script>
  </body>
</html>
