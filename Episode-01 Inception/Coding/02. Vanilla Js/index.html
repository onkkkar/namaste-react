<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>
      Namaste React - Vanilla JS
    </title>
  </head>
  <body>
    <div id="root"></div>

  <!-- Same result as pure HTML, but built manually using vanilla JavaScript and DOM APIs
  Steps:
    1. Create the h1 element
    2. Set its text
    3. Grab the root div
    4. Append the h1 into the root div
  -->
    <script>
      // 1. Create a new h1 element
      const heading =
        document.createElement('h1');

      // 2. Set the inner HTML (text content) of the heading
      heading.innerHTML =
        'Hello from Vanilla JS';

      // 3. Select the root div
      const root =
        document.getElementById('root');

      // 4. Append the heading to the root div
      root.appendChild(heading);
    </script>
  </body>
</html>
