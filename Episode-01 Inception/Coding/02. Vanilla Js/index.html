<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Namaste React</title>
  </head>
  <body>
    <!--  Using Vanilla JS -->
    <script>
      // Create a new h1 element
      const heading =
        document.createElement('h1');

      // Set the inner HTML of the heading
      heading.innerHTML =
        'Hello from Vanilla JS';

      // Select the root div and append the heading to it
      const root =
        document.getElementById('root');

      // Append the heading to the root div
      root.appendChild(heading);
    </script>
  </body>
</html>
