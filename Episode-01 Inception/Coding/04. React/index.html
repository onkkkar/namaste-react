<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />
    <title>
      Namaste React - Separate Files
    </title>
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>
  <body>
    <!-- Root Div -->
    <div id="root"></div>

    <!-- React CDN -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <!-- Our own script, in a separate file -->
    <script src="./index.js"></script>


    <!--
    Order of files matters:
    1. Root div must exist before scripts run
    2. React + ReactDOM CDN scripts must load BEFORE index.js,
    since index.js uses the React / ReactDOM globals
    -->
  </body>
</html>
